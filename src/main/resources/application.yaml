server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: Admin

  datasource:
    url: "jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:momentlit}?currentSchema=${DB_SCHEMA:spaces}"
    username: "${DB_USERNAME:momentlit}"
    password: "${DB_PASSWORD:momentlit1234@}"
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: "${JPA_DDL_AUTO:update}"
    show-sql: true

jwt:
  secret: "${JWT_SECRET:momentlit-admin-service-jwt-secret-key-for-local-test-1234567890}"
